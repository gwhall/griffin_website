<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media — Griffin Hall Coffee</title>
  <meta name="description" content="Moments from Griffin Hall Coffee events, and words from the people who've shared the table." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">Griffin Hall</span>
        <span class="brand-sub">Coffee</span>
      </a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="site-nav">
        <a href="index.html">Events</a>
        <a href="photos.html">Media</a>
        <a href="consulting.html">Consulting</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="wrap hero-inner">
        <span class="eyebrow">Media</span>
        <h1>Interdisciplinary <em>coffee</em> experiences since 2023</h1>
        <p class="hero-sub">A look at what these gatherings feel like. Real photos and video are on the way — placeholders for now.</p>
      </div>
    </section>

    <section class="section">
      <div class="wrap">
        <div class="section-head">
          <span class="eyebrow">Gallery</span>
          <h2>Moments</h2>
        </div>
        <div class="media-grid">
          <figure class="media-tile wide media-video">
            <video src="photos/Video.mp4" controls playsinline preload="metadata" poster="photos/Video_cover.jpg">
              Your browser doesn't support embedded video — <a href="photos/Video.mp4">download it here</a>.
            </video>
          </figure>
          <figure class="media-tile portrait m-prf">
            <img src="photos/PRFmain.jpg" alt="Griffin speaking on stage at PRF El Salvador" loading="lazy" />
            <figcaption class="mcap"><span class="orn">&#10047;</span>On stage &middot; El Salvador</figcaption>
          </figure>
          <figure class="media-tile portrait m-pour">
            <img src="photos/Pourover.JPG" alt="A slow pour-over brewing into a glass carafe" loading="lazy" />
            <figcaption class="mcap"><span class="orn">&#10047;</span>The pour</figcaption>
          </figure>
          <figure class="media-tile m-brew">
            <img src="photos/BrewClass.jpg" alt="A group gathered around a brew-class table" loading="lazy" />
            <figcaption class="mcap"><span class="orn">&#10047;</span>Brew class</figcaption>
          </figure>
          <figure class="media-tile m-comp">
            <img src="photos/CoffeeCompetition.JPG" alt="Griffin leading a cupping and judging session" loading="lazy" />
            <figcaption class="mcap"><span class="orn">&#10047;</span>At the cupping table</figcaption>
          </figure>
          <figure class="media-tile m-farm">
            <img src="photos/GriffinFarm.jpeg" alt="Griffin planting a coffee seedling on a hillside farm" loading="lazy" />
            <figcaption class="mcap"><span class="orn">&#10047;</span>Planting season</figcaption>
          </figure>
          <figure class="media-tile m-cups">
            <img src="photos/Cups.jpg" alt="Hands tasting a flight of coffees" loading="lazy" />
            <figcaption class="mcap"><span class="orn">&#10047;</span>Tasting flight</figcaption>
          </figure>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <div class="footer-brand">Griffin Hall Coffee</div>
      <nav class="footer-social" id="footer-social"></nav>
      <div class="footer-copy">&copy; <span id="year"></span> Griffin Hall Coffee</div>
    </div>
  </footer>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/nav.js"></script>
</body>
</html>
